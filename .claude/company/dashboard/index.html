<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Company Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <header>
    <div class="brand">
      <span class="logo">VC</span>
      <span class="title" id="project-name">Virtual Company</span>
      <span class="badge" id="connection-badge">연결중...</span>
    </div>
    <div class="header-stats">
      <div class="stat">
        <span class="stat-label">모드</span>
        <span class="stat-value">v2 — Agent Tool</span>
      </div>
      <div class="stat">
        <span class="stat-label">Time</span>
        <span class="stat-value" id="now-time">—</span>
      </div>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="overview"><i data-lucide="layout-dashboard" class="tab-icon"></i> Overview</button>
    <button class="tab" data-tab="run"><i data-lucide="play" class="tab-icon"></i> Run</button>
    <button class="tab" data-tab="activity"><i data-lucide="scroll-text" class="tab-icon"></i> Activity</button>
    <button class="tab" data-tab="agents"><i data-lucide="users" class="tab-icon"></i> Agents</button>
  </nav>

  <main>
    <!-- Overview -->
    <section id="tab-overview" class="tab-panel active">
      <div class="kpi-strip" id="kpi-strip"></div>
      <div class="agent-grid" id="agent-grid"></div>
    </section>

    <!-- Run -->
    <section id="tab-run" class="tab-panel">
      <!-- 실행 상태 표시 -->
      <div class="run-status" id="run-status"></div>

      <!-- 멀티에이전트 모드 -->
      <div class="run-card">
        <div class="run-card-header">
          <span class="run-card-icon"><i data-lucide="brain" style="width:24px;height:24px;color:var(--accent)"></i></span>
          <div>
            <h3>멀티에이전트 모드</h3>
            <p class="run-card-desc">CEO가 자율적으로 팀원을 호출하고 조율합니다</p>
          </div>
        </div>
        <div class="run-input-row">
          <input type="text" id="run-task-input" class="run-input" placeholder="태스크를 입력하세요 (예: 할일 앱 만들어줘)" />
          <button id="btn-run" class="btn-primary" onclick="runTask()">실행</button>
        </div>
      </div>

      <!-- 워크플로우 모드 -->
      <div class="run-card">
        <div class="run-card-header">
          <span class="run-card-icon"><i data-lucide="git-branch" style="width:24px;height:24px;color:var(--accent)"></i></span>
          <div>
            <h3>워크플로우 모드</h3>
            <p class="run-card-desc">YAML 파이프라인을 정해진 순서대로 실행합니다</p>
          </div>
        </div>
        <div class="workflow-list" id="workflow-list"></div>
        <div class="run-input-row">
          <input type="text" id="wf-input" class="run-input" placeholder="워크플로우에 전달할 입력 (예: 검색 기능 추가)" />
          <button id="btn-wf" class="btn-secondary" onclick="runWorkflow()">실행</button>
        </div>
      </div>
    </section>

    <!-- Activity Log -->
    <section id="tab-activity" class="tab-panel">
      <div class="activity-log" id="activity-log"></div>
    </section>

    <!-- Agents -->
    <section id="tab-agents" class="tab-panel">
      <div class="agents-toolbar">
        <button class="btn-primary" onclick="openCreateModal()"><i data-lucide="plus" class="btn-lucide"></i> 새 에이전트</button>
        <button class="btn-secondary" onclick="openImportModal()"><i data-lucide="download" class="btn-lucide"></i> 글로벌에서 가져오기</button>
      </div>
      <div class="agent-detail-grid" id="agent-detail-grid"></div>
    </section>

    <!-- Agent Editor Modal -->
    <div class="modal-overlay" id="modal-agent-editor" onclick="if(event.target===this)closeModal()">
      <div class="modal modal-wide">
        <div class="modal-header">
          <h3 id="modal-editor-title">에이전트 편집</h3>
          <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body">
          <!-- 상단: AI 생성 -->
          <div class="ai-gen-bar" id="ai-gen-bar">
            <input type="text" id="ai-role-input" class="run-input" placeholder="역할을 설명하세요 (예: 데이터 엔지니어, Airflow/Spark 전문)" />
            <button class="btn-accent" id="btn-ai-gen" onclick="generateWithAI()"><i data-lucide="sparkles" class="btn-lucide"></i> AI 생성</button>
          </div>

          <!-- ID + 메타 -->
          <div class="form-row">
            <div class="form-group" style="flex:1">
              <label>ID (kebab-case)</label>
              <input type="text" id="editor-agent-id" class="run-input" placeholder="data-engineer" />
            </div>
            <div class="form-group" style="flex:0 0 160px">
              <label>저장 위치</label>
              <select id="editor-scope" class="run-input">
                <option value="local">🏠 프로젝트만</option>
                <option value="global">🌐 글로벌만</option>
                <option value="both">🌐+🏠 둘 다</option>
              </select>
            </div>
          </div>

          <!-- 색상 선택 -->
          <div class="form-group">
            <label>색상</label>
            <div class="color-picker" id="color-picker"></div>
          </div>

          <!-- 에디터 -->
          <div class="form-group">
            <label>내용 (.md)</label>
            <textarea id="editor-agent-content" class="editor-textarea" placeholder="AI 생성 버튼을 누르거나 직접 작성하세요..."></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" onclick="closeModal()">취소</button>
          <button class="btn-primary" onclick="saveAgent()">저장</button>
        </div>
      </div>
    </div>

    <!-- Import Modal -->
    <div class="modal-overlay" id="modal-import" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header">
          <h3>글로벌 에이전트 가져오기</h3>
          <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body">
          <div class="import-list" id="import-list">로딩중...</div>
        </div>
      </div>
    </div>
  </main>

  <footer class="status-bar">
    <span id="status-text">대기중</span>
    <span class="status-dot" id="status-dot"></span>
  </footer>

  <script src="/app.js"></script>
  <script>
    // BUG-005: MutationObserver 제거 — 무한 루프 방지
    // lucide.createIcons()는 각 render 함수 끝에서 직접 호출됨
    document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
  </script>
</body>
</html>
