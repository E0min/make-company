name: 디자인 작업
description: PM 요구사항 → Designer 스펙 → Frontend 구현

steps:
  - id: requirements
    agent: product-manager
    prompt: |
      다음 디자인 요청에 대한 요구사항을 정리해주세요:
      {{input}}
    output: requirements

  - id: design
    agent: ui-ux-designer
    prompt: |
      요구사항 기반으로 디자인 스펙을 작성해주세요:
      {{steps.requirements.output}}
    depends_on: [requirements]
    output: design_spec

  - id: implement
    agent: frontend-engineer
    prompt: |
      디자인 스펙을 코드로 구현해주세요:
      {{steps.design.output}}
    depends_on: [design]
    output: implementation
