name: 버그 수정
description: QA 진단 → Engineer 수정 → QA 검증

steps:
  - id: diagnosis
    agent: fe-qa
    prompt: |
      다음 버그를 조사하고 원인을 분석해주세요:
      {{input}}
    output: diagnosis

  - id: fix
    agent: frontend-engineer
    prompt: |
      다음 진단 결과를 바탕으로 버그를 수정해주세요:
      {{steps.diagnosis.output}}
    depends_on: [diagnosis]
    output: fix

  - id: verify
    agent: fe-qa
    prompt: |
      수정 결과를 검증해주세요:
      {{steps.fix.output}}
    depends_on: [fix]
    output: verification
