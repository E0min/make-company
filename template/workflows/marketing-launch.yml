name: 마케팅 출시
description: PM 분석 → (Marketing ∥ Designer) → CEO 최종 검토

steps:
  - id: analysis
    agent: product-manager
    prompt: |
      다음 제품/기능의 마케팅을 위한 분석을 해주세요:
      {{input}}
    output: analysis

  - id: strategy
    agent: marketing-strategist
    prompt: |
      다음 분석 기반으로 마케팅 전략과 카피를 작성해주세요:
      {{steps.analysis.output}}
    depends_on: [analysis]
    output: marketing_strategy

  - id: visual
    agent: ui-ux-designer
    prompt: |
      마케팅 전략에 맞는 비주얼 가이드를 작성해주세요:
      {{steps.analysis.output}}
    depends_on: [analysis]
    output: visual_guide

  - id: review
    agent: ceo
    prompt: |
      마케팅 전략과 비주얼을 최종 검토해주세요:
      전략: {{steps.strategy.output}}
      비주얼: {{steps.visual.output}}
    depends_on: [strategy, visual]
    output: final_review
